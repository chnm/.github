name: Hugo Build, Release, and Deploy Reusable Workflow

on:
  workflow_call:
    inputs:
      # Build Input Vars
      container-registry:                 # container registry e.g. ghcr.io
        required: true
        type: string
      container-image-name:               # name of container image i.e. github package
        required: true
        type: string
      hugo-context-root:                  # root path for hugo build
        required: true
        type: string
      hugo-devl-url:                      # hugo development url
        required: true
        type: string
      hugo-prod-url:                      # hugo production url
        required: true
        type: string
      hugo-content-path:                  # path to built content in container; defaults to nginx html dir
        required: false
        type: string
        default: /usr/share/nginx/html/

      # Release Input Vars
      build-artifact-name:                # name of build artifact to transfer between jobs/workflows
        required: true
        type: string
      release-tag-name-type:              # semvar | iso
        required: true
        type: string
      tag-prefix:                         # optional prefix for tag/release name;
        required: false                   # use for monorepo per-module releases,
        type: string                      # e.g. "module-a/" → tag "module-a/v0.1.2".
        default: ''                       # semvar lookup scopes to "${prefix}v*".

      # Deployment Input Vars
      website-devl-fqdn:                  # fqdn of development website
        required: true
        type: string
      website-prod-fqdn:                  # fqdn of production website
        required: true
        type: string
      runner_labels:                      # JSON array of labels for the
        required: false                   # self-hosted deploy job; default
        type: string                      # pins to the legacy XCP-ng runner
        default: '["self-hosted","XCP-ng"]'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CONTAINER_TAG: "${{ inputs.container-registry }}/chnm/${{ inputs.container-image-name }}:latest"
  RELEASE_NAME: ''
  RELEASE_TAG_NAME: ''
  WEBSITE_FQDN: ''

jobs:

  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Print GitHub Context Vars
        run: |
          echo "run_id: ${{ github.run_id }}"
          echo "workflow: ${{ github.workflow }}"
          echo "workflow_ref: ${{ github.workflow_ref }}"
          echo "workflow_sha: ${{ github.workflow_sha }}"
          echo "workspace: ${{ github.workspace }}"
          echo "repository: ${{ github.repository }}"
          echo "repository_owner: ${{ github.repository_owner }}"
          echo "event.repository_name: ${{ github.event.repository.name }}"
          echo "repositoryUrl: ${{ github.repositoryUrl }}"
          echo "action_ref: ${{ github.action_ref }}"
          echo "event_name: ${{ github.event_name }}"
          echo "actor: ${{ github.actor }}"
          echo "triggering_actor: ${{ github.triggering_actor }}"
          echo "base_ref: ${{ github.base_ref }}"
          echo "ref_name: ${{ github.ref_name }}"
          echo "ref_type: ${{ github.ref_type }}"
          echo "ref: ${{ github.ref }}"
          echo "sha: ${{ github.sha }}"
  
      - name: Set WEBSITE_FQDN devl Env Var
        run: echo "WEBSITE_FQDN=${{ inputs.website-devl-fqdn }}" >> $GITHUB_ENV
      - name: Set WEBSITE_FQDN prod Env Var
        if: github.ref == 'refs/heads/main'
        run: echo "WEBSITE_FQDN=${{ inputs.website-prod-fqdn }}" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          repository: 'chnm/.github'
          ref: 'main'
      - name: Run Validate Inputs Script
        run: ./.github/scripts/validate_inputs.sh
        env:
          WEBSITE_FQDN: "${{ env.WEBSITE_FQDN }}"

    outputs:
      website_fqdn: ${{ env.WEBSITE_FQDN }}    

#################
###   BUILD   ###
#################  

  build-hugo:
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      packages: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          repository: '${{ github.repository }}'   # the invoking repository
          fetch-depth: 0   # required for github-action-get-previous-tag (semvar)

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          username: ${{ github.repository_owner }}
          password: ${{ env.GITHUB_TOKEN }}
          registry: ${{ inputs.container-registry }}

      - name: Build and Push Docker Image for Local Dev
        uses: docker/build-push-action@v4
        with:
          context: "${{ inputs.hugo-context-root }}"
          push: true
          tags: "${{ env.CONTAINER_TAG }}"
          platforms: linux/amd64

      - name: Build Docker Image (devl)
        if: github.ref != 'refs/heads/main'
        uses: docker/build-push-action@v4
        with:
          context: "${{ inputs.hugo-context-root }}"
          push: false
          tags: "${{ env.CONTAINER_TAG }}"
          platforms: linux/amd64
          build-args: |
            hugobuildargs=--environment development --cleanDestinationDir --buildDrafts --buildFuture --baseURL ${{ inputs.hugo-devl-url }}

      - name: Build Docker Image (prod)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v4
        with:
          context: "${{ inputs.hugo-context-root }}"
          push: false
          tags: "${{ env.CONTAINER_TAG }}"
          platforms: linux/amd64
          build-args: |
            hugobuildargs=--environment production --cleanDestinationDir --minify --baseURL ${{ inputs.hugo-prod-url }}

      - name: Extract build artifact
        uses: shrink/actions-docker-extract@v2
        id: extract
        with:
          image: "${{ env.CONTAINER_TAG }}"
          path: ${{ inputs.hugo-content-path }}

      - name: Archive build artifact
        run: |
          SUBDIR=$(basename "${{ inputs.hugo-content-path }}")
          tar czvf ${{ inputs.build-artifact-name }}.tar.gz -C ${{ steps.extract.outputs.destination }}/"$SUBDIR" .

###################
###   RELEASE   ###
###################

      - id: build_timestamp
        if: inputs.release-tag-name-type == 'iso'
        name: Get build timestamp
        run: echo "ts=$(TZ=America/New_York date +'%Y-%m-%dT%H:%M:%S%z')" >> $GITHUB_OUTPUT

      - id: build_timestamp_for_tag
        if: inputs.release-tag-name-type == 'iso'
        name: Get build timestamp for tag
        run: echo "ts=$(TZ=America/New_York date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

      - if: inputs.release-tag-name-type == 'iso'
        name: Set RELEASE_NAME / RELEASE_TAG_NAME env (iso)
        run: |
          echo "RELEASE_NAME=${{ inputs.tag-prefix }}${{ steps.build_timestamp.outputs.ts }}" >> $GITHUB_ENV
          echo "RELEASE_TAG_NAME=${{ inputs.tag-prefix }}${{ steps.build_timestamp_for_tag.outputs.ts }}" >> $GITHUB_ENV

      # Scope the previous-tag lookup to "${tag-prefix}v*" so monorepos can
      # release each module independently. `bootstrap=true` when no prior
      # tag exists for this prefix — drives the minor-bump branch below.
      - id: previoustag
        if: inputs.release-tag-name-type == 'semvar'
        name: Get previous tag (scoped by tag-prefix)
        env:
          PREFIX: ${{ inputs.tag-prefix }}
        run: |
          if tag=$(git describe --tags --abbrev=0 --match "${PREFIX}v*" 2>/dev/null); then
            version=${tag#${PREFIX}v}
            echo "bootstrap=false" >> $GITHUB_OUTPUT
          else
            version="0.0.9"
            echo "bootstrap=true" >> $GITHUB_OUTPUT
          fi
          echo "version=${version}" >> $GITHUB_OUTPUT

      - id: semver
        if: inputs.release-tag-name-type == 'semvar'
        name: Get next semantic version
        uses: 'WyriHaximus/github-action-next-semvers@v1'
        with:
          version: ${{ steps.previoustag.outputs.version }}

      - if: inputs.release-tag-name-type == 'semvar' && steps.previoustag.outputs.bootstrap == 'false'
        name: Set RELEASE_NAME / RELEASE_TAG_NAME env (semvar)
        run: |
          echo "RELEASE_NAME=${{ inputs.tag-prefix }}${{ steps.semver.outputs.v_patch }}" >> $GITHUB_ENV
          echo "RELEASE_TAG_NAME=${{ inputs.tag-prefix }}${{ steps.semver.outputs.v_patch }}" >> $GITHUB_ENV
      - if: inputs.release-tag-name-type == 'semvar' && steps.previoustag.outputs.bootstrap == 'true'
        name: Set RELEASE_NAME / RELEASE_TAG_NAME env (semvar bootstrap)
        run: |
          echo "RELEASE_NAME=${{ inputs.tag-prefix }}${{ steps.semver.outputs.v_minor }}" >> $GITHUB_ENV
          echo "RELEASE_TAG_NAME=${{ inputs.tag-prefix }}${{ steps.semver.outputs.v_minor }}" >> $GITHUB_ENV

      - name: Generate RELEASE.md
        run: |
          echo '`github` context:' > RELEASE.md
          echo '```' >> RELEASE.md
          echo "run_id: ${{ github.run_id }}" >> RELEASE.md
          echo "workflow: ${{ github.workflow }}" >> RELEASE.md
          echo "workflow_ref: ${{ github.workflow_ref }}" >> RELEASE.md
          echo "workflow_sha: ${{ github.workflow_sha }}" >> RELEASE.md
          echo "workspace: ${{ github.workspace }}" >> RELEASE.md
          echo "repository: ${{ github.repository }}" >> RELEASE.md
          echo "repository_owner: ${{ github.repository_owner }}" >> RELEASE.md
          echo "repository_name: ${{ github.event.repository.name }}" >> RELEASE.md
          echo "repositoryUrl: ${{ github.repositoryUrl }}" >> RELEASE.md
          echo "action_ref: ${{ github.action_ref }}" >> RELEASE.md
          echo "event_name: ${{ github.event_name }}" >> RELEASE.md
          echo "actor: ${{ github.actor }}" >> RELEASE.md
          echo "triggering_actor: ${{ github.triggering_actor }}" >> RELEASE.md
          echo "base_ref: ${{ github.base_ref }}" >> RELEASE.md
          echo "ref_name: ${{ github.ref_name }}" >> RELEASE.md
          echo "ref_type: ${{ github.ref_type }}" >> RELEASE.md
          echo "ref: ${{ github.ref }}" >> RELEASE.md
          echo "sha: ${{ github.sha }}" >> RELEASE.md
          echo '```' >> RELEASE.md

      - id: create_release
        name: Create release and upload tarball
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.RELEASE_TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          body_path: ./RELEASE.md
          files: "./${{ inputs.build-artifact-name }}.tar.gz"

    outputs:
      release_name: ${{ env.RELEASE_NAME }}

  release-notify:
    name: Release Notification
    needs: build-hugo
    if: >
      always() && !cancelled() &&
      needs.build-hugo.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: rtCamp/action-slack-notify@v2.2.0
        env:
          MSG_MINIMAL: true
          #SLACK_COLOR: '#c32a26'
          SLACK_COLOR: '#fab005'
          #SLACK_COLOR: '#58a459'
          SLACK_MESSAGE: |
            ```
            branch: ${{ github.ref_name }}
            workflow_ref: ${{ github.workflow_ref }}
            commit (${{ github.sha }}): ${{ github.event.commits[0].message }}
            ```
          SLACK_TITLE: 'Ready to Deploy :rocket: - `${{ github.repository }}` Release ${{ needs.build-hugo.outputs.release_name }}'
          SLACK_USERNAME: rrchnm-systems
          SLACK_WEBHOOK: "${{ secrets.SLACK_WEBHOOK_SYSTEMS }}"

######################
###   DEPLOYMENT   ###
######################

  deploy-ansible-playbook:
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    needs: [setup, build-hugo]
    if: >
      always() && !cancelled() &&
      needs.build-hugo.result == 'success'
    steps:
      # Serialize the github context for the ansible playbook's Slack
      # notification step. Pure-bash wrap (no python3 dep — toJSON already
      # produces valid JSON, we just nest it under a `github_context` key
      # so ansible loads it as `-e "@..."` into that variable).
      - env:
          GITHUB_CONTEXT: ${{ toJSON(github) }}
        run: |
          printf '{"github_context": %s}\n' "$GITHUB_CONTEXT" > github-context.json
          cat github-context.json

      # IncusOS path (levi): new playbook resolves repo/branch/subdir from
      # ansible/vars/hugo-sites.yaml keyed off target_fqdn. The build tarball
      # has already been published as a GitHub release by build-hugo, so the
      # playbook fetches the release artifact itself; github-context.json IS
      # passed so the playbook's Slack notification can attribute the deploy
      # to a commit / branch / actor. GITHUB_CONTEXT_PATH tells
      # run-ansible-playbook.sh to bind-mount the host file in as
      # /github-context.json inside the inner ansible container.
      - if: ${{ contains(inputs.runner_labels, 'IncusOS') }}
        env:
          GITHUB_CONTEXT_PATH: "${{ github.workspace }}/github-context.json"
        run: |
          run-ansible-playbook.sh playbooks/deploy-hugo-sites.yaml \
          -e "target_fqdn=${{ needs.setup.outputs.website_fqdn }}" \
          -e "@/github-context.json"

      # Legacy XCP-ng path
      - if: ${{ !contains(inputs.runner_labels, 'IncusOS') }}
        env:
          GITHUB_CONTEXT_PATH: "${{ github.workspace }}/github-context.json"
        run: |
          run-ansible-playbook.sh playbooks/deploy-ssg-website.yaml \
          -e "input_website_fqdn=${{ needs.setup.outputs.website_fqdn }}" \
          -e "@/github-context.json"

  deploy-notify:
    name: Deployment Notification
    needs: [build-hugo, deploy-ansible-playbook]
    if: >
      always() && !cancelled() &&
      (needs.deploy-ansible-playbook.result != 'success' || needs.build-hugo.result != 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: rtCamp/action-slack-notify@v2.2.0
        env:
          MSG_MINIMAL: true
          SLACK_COLOR: '#c32a26'
          SLACK_MESSAGE: |
            ```
            branch: ${{ github.ref_name }}
            workflow_ref: ${{ github.workflow_ref }}
            commit (${{ github.sha }}): ${{ github.event.commits[0].message }}
            ```
            View details at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SLACK_TITLE: 'Deployment Failed - `${{ github.repository }}` Release ${{ needs.build-hugo.outputs.release_name }}'
          SLACK_USERNAME: rrchnm-systems
          SLACK_WEBHOOK: "${{ secrets.SLACK_WEBHOOK_SYSTEMS }}"
