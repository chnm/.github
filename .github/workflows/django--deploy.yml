name: Django Deploy Reusable Workflow

on:
  workflow_call:
    inputs:
      # Deployment Input Vars
      website-devl-fqdn:                  # fqdn of development website
        required: true
        type: string
      website-prod-fqdn:                  # fqdn of production website
        required: true
        type: string
      runner_labels:                      # JSON array of labels for the
        required: false                   # self-hosted deploy job; default
        type: string                      # pins to the legacy XCP-ng runner
        default: '["self-hosted","XCP-ng"]'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:

  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Print GitHub Context Vars
        run: |
          echo "run_id: ${{ github.run_id }}"
          echo "workflow: ${{ github.workflow }}"
          echo "workflow_ref: ${{ github.workflow_ref }}"
          echo "workflow_sha: ${{ github.workflow_sha }}"
          echo "workspace: ${{ github.workspace }}"
          echo "repository: ${{ github.repository }}"
          echo "repository_owner: ${{ github.repository_owner }}"
          echo "event.repository_name: ${{ github.event.repository.name }}"
          echo "repositoryUrl: ${{ github.repositoryUrl }}"
          echo "action_ref: ${{ github.action_ref }}"
          echo "event_name: ${{ github.event_name }}"
          echo "actor: ${{ github.actor }}"
          echo "triggering_actor: ${{ github.triggering_actor }}"
          echo "base_ref: ${{ github.base_ref }}"
          echo "ref_name: ${{ github.ref_name }}"
          echo "ref_type: ${{ github.ref_type }}"
          echo "ref: ${{ github.ref }}"
          echo "sha: ${{ github.sha }}"

      - name: Validate website FQDN
        id: validate
        uses: chnm/.github/.github/actions/validate-fqdn@main
        with:
          website-devl-fqdn: ${{ inputs.website-devl-fqdn }}
          website-prod-fqdn: ${{ inputs.website-prod-fqdn }}

    outputs:
      website_fqdn: ${{ steps.validate.outputs.website_fqdn }}

  deploy-ansible-playbook:
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    needs: [setup]
    if: >
      always() && !cancelled() && needs.setup.result == 'success'
    steps:
      - env:
          GITHUB_CONTEXT: ${{ toJSON(github) }}
        run: |
          python3 -c 'import json,os,sys; json.dump({"github_context": json.loads(os.environ["GITHUB_CONTEXT"])}, sys.stdout)' > github-context.json
          cat github-context.json

      - env:
          GITHUB_CONTEXT_PATH: "${{ github.workspace }}/github-context.json"
        run: |
          run-ansible-playbook.sh playbooks/deploy-docker-compose.yaml \
          -e "input_website_fqdn=${{ needs.setup.outputs.website_fqdn }}" \
          -e "@/github-context.json" \
          --skip-tags=tag_borg

  deploy-notify:
    name: Deployment Notification
    needs: deploy-ansible-playbook
    if: >
      always() && !cancelled() &&
      (needs.deploy-ansible-playbook.result != 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: rtCamp/action-slack-notify@v2.2.0
        env:
          MSG_MINIMAL: true
          SLACK_COLOR: '#c32a26'
          SLACK_MESSAGE: |
            ```
            branch: ${{ github.ref_name }}
            workflow_ref: ${{ github.workflow_ref }}
            commit (${{ github.sha }}): ${{ github.event.commits[0].message }}
            ```
            View details at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SLACK_TITLE: 'Deployment Failed - `${{ github.repository }}` Release ${{ needs.release-create.outputs.release_name }}'
          SLACK_USERNAME: rrchnm-systems
          SLACK_WEBHOOK: "${{ secrets.SLACK_WEBHOOK_SYSTEMS }}"
