name: Hugo Deploy Reusable Workflow

# Deploy-only counterpart to hugo--build-release-deploy.yml. Assumes the
# build artifact has ALREADY been published as a GitHub release (e.g. by a
# caller's build-release job). The ansible playbook resolves repo / branch /
# subdir from ansible/vars/hugo-sites.yaml keyed off target_fqdn and fetches
# the matching release tarball itself — so this workflow only needs the FQDN.
#
# Use this when a repo builds its own artifact(s) and just wants the deploy
# leg — notably monorepos that publish several per-site releases and call this
# once per site (see chnm/game-sites .github/workflows/cicd.yml).

on:
  workflow_call:
    inputs:
      # Deployment Input Vars
      website-devl-fqdn:                  # fqdn of development website
        required: true
        type: string
      website-prod-fqdn:                  # fqdn of production website
        required: true
        type: string
      runner_labels:                      # JSON array of labels for the
        required: false                   # self-hosted deploy job; default
        type: string                      # pins to the legacy XCP-ng runner
        default: '["self-hosted","XCP-ng"]'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  WEBSITE_FQDN: ''

jobs:

  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Print GitHub Context Vars
        run: |
          echo "run_id: ${{ github.run_id }}"
          echo "workflow: ${{ github.workflow }}"
          echo "workflow_ref: ${{ github.workflow_ref }}"
          echo "workflow_sha: ${{ github.workflow_sha }}"
          echo "workspace: ${{ github.workspace }}"
          echo "repository: ${{ github.repository }}"
          echo "repository_owner: ${{ github.repository_owner }}"
          echo "event.repository_name: ${{ github.event.repository.name }}"
          echo "repositoryUrl: ${{ github.repositoryUrl }}"
          echo "action_ref: ${{ github.action_ref }}"
          echo "event_name: ${{ github.event_name }}"
          echo "actor: ${{ github.actor }}"
          echo "triggering_actor: ${{ github.triggering_actor }}"
          echo "base_ref: ${{ github.base_ref }}"
          echo "ref_name: ${{ github.ref_name }}"
          echo "ref_type: ${{ github.ref_type }}"
          echo "ref: ${{ github.ref }}"
          echo "sha: ${{ github.sha }}"

      - name: Set WEBSITE_FQDN devl Env Var as default
        run: echo "WEBSITE_FQDN=${{ inputs.website-devl-fqdn }}" >> $GITHUB_ENV
      - name: Set WEBSITE_FQDN prod Env Var
        if: github.ref == 'refs/heads/main'
        run: echo "WEBSITE_FQDN=${{ inputs.website-prod-fqdn }}" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          repository: 'chnm/.github'
          ref: 'main'
      - name: Run Validate Inputs Script
        run: ./.github/scripts/validate_inputs.sh
        env:
          WEBSITE_FQDN: "${{ env.WEBSITE_FQDN }}"

    outputs:
      website_fqdn: ${{ env.WEBSITE_FQDN }}

  deploy-ansible-playbook:
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    needs: [setup]
    if: >
      always() && !cancelled() &&
      needs.setup.result == 'success'
    steps:
      # Playbook invocation (context json + IncusOS/legacy paths) is shared with
      # hugo--build-release-deploy.yml via this composite action.
      - uses: chnm/.github/.github/actions/hugo-ansible-deploy@main
        with:
          website-fqdn:  ${{ needs.setup.outputs.website_fqdn }}
          runner-labels: ${{ inputs.runner_labels }}

  deploy-notify:
    name: Deployment Notification
    needs: deploy-ansible-playbook
    if: >
      always() && !cancelled() &&
      (needs.deploy-ansible-playbook.result != 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: rtCamp/action-slack-notify@v2.2.0
        env:
          MSG_MINIMAL: true
          SLACK_COLOR: '#c32a26'
          SLACK_MESSAGE: |
            ```
            branch: ${{ github.ref_name }}
            workflow_ref: ${{ github.workflow_ref }}
            commit (${{ github.sha }}): ${{ github.event.commits[0].message }}
            ```
            View details at ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SLACK_TITLE: 'Deployment Failed - `${{ github.repository }}`'
          SLACK_USERNAME: rrchnm-systems
          SLACK_WEBHOOK: "${{ secrets.SLACK_WEBHOOK_SYSTEMS }}"
